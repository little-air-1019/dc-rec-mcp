name: Validate
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: validate.sh gate ladder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run gate ladder
        run: ./validate.sh
